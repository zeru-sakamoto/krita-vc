<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krita VCS</title>
    <style>
      /* Themed background + spinner shown before React mounts (avoids a white/black
         startup flash). Colors come from --boot-bg/--boot-accent, set by the inline
         script below from the persisted theme (see src/lib/theme.tsx) so the flash
         matches whatever theme the user picked. Static markup only — main.tsx's
         render() replaces #root's contents wholesale, so this disappears on its
         own, no cleanup JS needed. */
      html,
      body {
        margin: 0;
        background: var(--boot-bg, #131210);
      }
      #boot-spinner {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      #boot-spinner div {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(128, 128, 128, 0.25);
        border-top-color: var(--boot-accent, #e07b39);
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // Duplicates THEMES' bg/accent from src/lib/theme.tsx (can't import a module
      // here — this runs before bundling). Keep the two in sync by hand.
      (function () {
        var THEME_COLORS = {
          charcoal: ["#131210", "#e07b39"],
          "krita-blue": ["#1e1e24", "#2e86de"],
          "electric-cyan": ["#1a1d24", "#00d2d3"],
          "sunset-coral": ["#201e22", "#ff6b6b"],
          "tokyo-night": ["#1a1b26", "#7aa2f7"],
          "true-black": ["#000000", "#8b5cf6"],
          "charcoal-light": ["#f4f1ea", "#a8511a"],
          "studio-light": ["#f5f6fa", "#2e86de"],
        };
        var id = localStorage.getItem("krita-vc:theme");
        var colors = THEME_COLORS[id] || THEME_COLORS.charcoal;
        document.documentElement.style.setProperty("--boot-bg", colors[0]);
        document.documentElement.style.setProperty("--boot-accent", colors[1]);
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div id="boot-spinner"><div></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
